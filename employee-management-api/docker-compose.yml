services:
  mongodb:
    image: mongo:7
    container_name: employee_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: employee-management-api:latest
    container_name: employee_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/employee_management
    ports:
      - "${API_HOST_PORT:-5001}:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongodb_data:
